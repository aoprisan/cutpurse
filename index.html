<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#131022">
<meta name="description" content="Cutpurse — a ten-night thieving campaign. Lift purses while the watch looks away, bank your take, and grow the Guild.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Cutpurse</title>
<style>
  :root{--night:#131022;--night2:#1c1730;--lantern:#e0a83c;--cloth:#a03030;--parch:#e3d5b3;--dim:#7a7290;--good:#8cdc8c}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{background:var(--night);color:var(--parch);font-family:Georgia,serif;
    display:flex;flex-direction:column;align-items:center;user-select:none;-webkit-user-select:none;touch-action:manipulation;
    padding-top:env(safe-area-inset-top)}
  header{width:100%;max-width:440px;padding:12px 18px 4px;display:flex;justify-content:space-between;align-items:baseline}
  h1{font-size:22px;letter-spacing:.28em;text-transform:uppercase;font-weight:400;color:var(--lantern);text-shadow:0 0 16px rgba(224,168,60,.4)}
  .hud{display:flex;gap:13px;font-variant-numeric:tabular-nums;font-size:15px}
  .hud span{color:var(--dim);font-size:10px;letter-spacing:.12em;text-transform:uppercase;display:block}
  .hud b{transition:color .2s}
  #muteBtn{cursor:pointer}
  #wrap{position:relative;flex:1;width:100%;max-width:440px;min-height:0;display:flex;align-items:center;justify-content:center}
  canvas{display:block;border-radius:12px;box-shadow:0 0 60px rgba(0,0,0,.6),inset 0 0 30px rgba(0,0,0,.4)}
  .panel{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(10,8,20,.93);text-align:center;padding:20px;border-radius:12px;z-index:5;overflow-y:auto;
    backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
  .panel.show{display:flex;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .panel h2{font-size:19px;letter-spacing:.18em;text-transform:uppercase;font-weight:400;margin-bottom:8px}
  .panel p{color:var(--dim);font-style:italic;max-width:300px;line-height:1.5;margin-bottom:12px}
  .panel .big{font-size:42px;color:var(--lantern);margin-bottom:2px;text-shadow:0 0 24px rgba(224,168,60,.5)}
  .panel .quota{color:var(--lantern);font-style:normal;margin-bottom:6px}
  .panel .coffers{color:var(--dim);font-size:13px;margin-bottom:14px}
  button{background:var(--night2);border:1px solid var(--lantern);color:var(--lantern);cursor:pointer;
    font-family:inherit;font-size:14px;letter-spacing:.15em;text-transform:uppercase;padding:12px 24px;border-radius:6px;margin:5px;
    transition:background .15s,box-shadow .15s}
  button:hover{background:#241d3e;box-shadow:0 0 18px rgba(224,168,60,.25)}
  button.ghost{border-color:#4a3f6b;color:var(--dim)}
  .relic{display:block;width:100%;max-width:290px;text-align:left;text-transform:none;letter-spacing:0;
    border-color:#4a3f6b;color:var(--parch);padding:14px 16px}
  .relic b{color:var(--lantern);display:block;font-size:15px;letter-spacing:.06em;margin-bottom:3px}
  .relic small{color:var(--dim);font-style:italic}
  #slipBtn{position:absolute;left:50%;transform:translateX(-50%);bottom:12px;z-index:4;display:none;
    background:rgba(16,13,28,.88);border-color:var(--good);color:var(--good);font-size:12px;padding:9px 18px}
  #slipBtn.show{display:block;animation:slipPulse 1.6s ease-in-out infinite}
  @keyframes slipPulse{0%,100%{box-shadow:0 0 6px rgba(140,220,140,.2)}50%{box-shadow:0 0 20px rgba(140,220,140,.55)}}
  /* Guild skill tree */
  #treeCols{display:flex;gap:8px;width:100%;max-width:420px;align-items:flex-start}
  .branch{flex:1;min-width:0}
  .branch h3{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);font-weight:400;margin-bottom:6px}
  .node{display:block;width:100%;text-align:left;text-transform:none;letter-spacing:0;margin:0 0 7px;
    padding:8px 9px;border-color:#3a3158;color:var(--parch)}
  .node b{display:block;font-size:12px;color:var(--lantern);margin-bottom:2px}
  .node small{display:block;font-size:10.5px;line-height:1.35;color:var(--dim);font-style:italic;margin-bottom:3px}
  .node .cost{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
  .node.available{border-color:var(--lantern)}
  .node.available .cost{color:var(--lantern)}
  .node.owned{border-color:#3f6b3f;opacity:.9;cursor:default}
  .node.owned .cost{color:var(--good)}
  .node.owned b{color:var(--good)}
  .node.poor,.node.locked{opacity:.45;cursor:default}
  footer{padding:8px 18px calc(16px + env(safe-area-inset-bottom));color:var(--dim);font-style:italic;font-size:12.5px;text-align:center;max-width:440px}
  /* campaign progress: one pip per night, lit as the campaign advances */
  .campaign{display:flex;align-items:center;justify-content:center;margin:2px 0 12px}
  .campaign i{display:block}
  .campaign .pip{width:11px;height:11px;border-radius:50%;border:1px solid #4a3f6b;background:#1c1730;box-sizing:border-box}
  .campaign .pip.done{background:#3f6b3f;border-color:#3f6b3f}
  .campaign .pip.current{background:var(--lantern);border-color:var(--lantern);box-shadow:0 0 10px rgba(224,168,60,.75);animation:pipGlow 1.6s ease-in-out infinite alternate}
  .campaign .pip.crown{border-color:var(--lantern)}
  .campaign .link{width:13px;height:2px;background:#332b4e}
  .campaign .link.done{background:#3f6b3f}
  .campaign .link.next{background:linear-gradient(90deg,#3f6b3f,var(--lantern))}
  @keyframes pipGlow{from{box-shadow:0 0 6px rgba(224,168,60,.45)}to{box-shadow:0 0 13px rgba(224,168,60,.9)}}
  .campaignLabel{color:var(--dim);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px}
</style>
</head>
<body>
<header>
  <h1>Cutpurse</h1>
  <div class="hud">
    <div><span>night</span><b id="nightNo">1</b></div>
    <div><span>take</span><b id="coins">0∕60</b></div>
    <div><span>time</span><b id="time">90</b></div>
    <div><span>luck</span><b id="hearts">♥♥♥</b></div>
    <div><span>sound</span><b id="muteBtn">on</b></div>
  </div>
</header>
<div id="wrap">
  <canvas id="cv"></canvas>
  <button id="slipBtn">Slip away</button>
  <div class="panel" id="relicPanel">
    <h2>A fence approaches</h2>
    <p>Choose one relic to aid the night's work.</p>
    <div id="relicBtns"></div>
  </div>
  <div class="panel show" id="startPanel">
    <h2 id="startTitle">Night 1 — Beggar's Yard</h2>
    <div class="campaign" id="startCampaign"></div>
    <p id="startFlavor"></p>
    <div class="quota" id="startQuota"></div>
    <div class="coffers" id="startCoffers"></div>
    <button id="startBtn">Begin the night</button>
    <button id="guildBtn" class="ghost">The Guild</button>
  </div>
  <div class="panel" id="guildPanel">
    <h2>The Thieves' Guild</h2>
    <div class="coffers" id="guildCoffers"></div>
    <div id="treeCols"></div>
    <button id="guildBackBtn" class="ghost">Back</button>
  </div>
  <div class="panel" id="endPanel">
    <h2 id="endTitle">Dawn breaks</h2>
    <div class="big" id="endCoins">0</div>
    <p id="endText"></p>
    <div class="campaign" id="endCampaign"></div>
    <div class="coffers" id="endCoffers"></div>
    <button id="nextBtn">Next night</button>
    <button id="endGuildBtn" class="ghost">The Guild</button>
  </div>
</div>
<footer>Tap marks outside every lantern's gaze. Meet the quota, then slip away — or push your luck till dawn.</footer>
<script type="module" src="src/main.ts"></script>
</body>
</html>
